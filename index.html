<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - Premium Collections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Schermata di Benvenuto (Gateway) -->
    <div id="welcome-screen" class="welcome-container">
        <div class="welcome-content">
            <h1 class="glitch-text" data-text="RESTRICTED AREA">RESTRICTED AREA</h1>
            <p>You are about to access the Premium Vault.</p>
            <button id="enter-btn" class="enter-btn">ENTER THE VAULT</button>
        </div>
    </div>

    <!-- App Principale (Nascosta all'inizio) -->
    <div id="main-app" class="app-container" style="display: none; opacity: 0; transition: opacity 1s ease;">
        <header>
            <h1>The Vault</h1>
            <p>Scroll to explore. Select an image to unlock via Throne.</p>
        </header>

        <main class="carousel-container">
            <button class="nav-btn prev-btn" id="prevBtn">&lt;</button>
            
            <div class="carousel" id="carousel">
                <!-- Items will be injected dynamically by JavaScript -->
            </div>

            <button class="nav-btn next-btn" id="nextBtn">&gt;</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
