<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - Premium Collections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>The Vault</h1>
            <p>Scroll to explore. Select an image to unlock via Throne.</p>
        </header>

        <main class="carousel-container">
            <button class="nav-btn prev-btn" id="prevBtn">&lt;</button>
            
            <div class="carousel" id="carousel">
                <!-- Items will be injected dynamically by JavaScript -->
            </div>

            <button class="nav-btn next-btn" id="nextBtn">&gt;</button>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
